[workspace]
resolver = "2"
members = [
    "crates/lumen-pty",
    "crates/lumen-term",
    "crates/lumen-renderer",
    "crates/lumen-app",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/jimhyliu/lumen"

[workspace.dependencies]
lumen-pty = { path = "crates/lumen-pty" }
lumen-term = { path = "crates/lumen-term" }
lumen-renderer = { path = "crates/lumen-renderer" }

anyhow = "1"
bitflags = "2"
bytemuck = { version = "1", features = ["derive"] }
thiserror = "2"
log = "0.4"
env_logger = "0.11"
crossbeam-channel = "0.5"
portable-pty = "0.9"
vte = "0.15"
unicode-width = "0.2"
winit = "0.30"
wgpu = "29"
glyphon = "0.11"
pollster = "0.4"

[profile.release]
lto = "thin"
codegen-units = 1

# 第三方依赖不带调试信息：规避 rustc 编译 naga 时的栈溢出，并加快编译。
[profile.dev.package."*"]
debug = false
