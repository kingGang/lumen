[package]
name = "lumen-app"
description = "Lumen 主程序：winit 事件循环，组装 PTY/终端状态机/渲染器"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "lumen"
path = "src/main.rs"

[features]
## 输入编辑器 footer 渲染（M4.1 批C）——设计稿 §7.1。
## 默认开启；剔除时所有 footer 渲染/占高逻辑被完全移除，
## 行为与旧版逐字节一致。
input-editor = ["lumen-renderer/input-editor"]
default = ["input-editor"]

[dependencies]
anyhow.workspace = true
arboard.workspace = true
crossbeam-channel.workspace = true
egui.workspace = true
egui-wgpu.workspace = true
egui-winit.workspace = true
egui_ltreeview.workspace = true
env_logger.workspace = true
log.workspace = true
lumen-pty.workspace = true
lumen-renderer.workspace = true
lumen-term.workspace = true
serde.workspace = true
serde_json.workspace = true
trash.workspace = true
winit.workspace = true
# 背景图片功能（P13）。
image.workspace = true
rfd.workspace = true

# 单实例检测（F8）仅 Windows 路径需要 Win32 同步原语。
[target.'cfg(windows)'.dependencies]
windows-sys.workspace = true
